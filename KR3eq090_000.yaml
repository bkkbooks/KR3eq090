body:
  text: 正文問溫病始於內經何條仲景接言者幾條後人治溫每與傷寒混者在何處自漢以來論溫病者幾家葉天士出而直接劉河間以三焦論治而治溫之法始詳其理安在上焦之治不外肺衛心營肺衛心營見證能詳述歟治肺衛者何方治心營者何方兼治者何方中焦之病在陽明經府見證分別何在白虎承氣變化幾方此外尚有何法脾臟獨不傳歟下焦之病在肝腎宜詳見證治當何方近日治溫多宗葉氏葉氏之闕失者何在吳氏之得失安在與葉氏可互參歟其詳晰書之天有六氣風寒暑濕燥火惟火有二曰君曰相風濕與燥無不兼溫惟寒水與溫相反然傷寒者必病熱溫病亦多矣哉陰陽應象大論曰重陰必陽重陽必陰故曰冬傷於寒春必病溫自漢以後醫家皆未註明因以溫病為傷寒伏氣遂以溫病與傷寒同治由其不知故曰二字從上句來也若曰冬日嚴寒重陰者必傷人之陽而病在陽春日大熱重陽者必傷人之陰而病在陰故曰在冬則名傷寒在春則名溫病仲景傷寒論剖別分明曰太陽病發熱無汗惡寒脈浮而緊者曰傷寒發熱而渴不惡寒者曰溫病發汗已身灼熱者名曰風溫然則伏氣竟不病乎曰溫病之原有三一曰伏氣指春溫兼咳溫瘧春初惡寒之病而言二曰主氣六元正紀大論曰辰戌年初之氣民病溫厲寅申丑未歲以次而推此客氣也若每年主氣春夏之交時令大熱熱氣感人豈無溫病三曰戾氣凶荒兵亂之後與非其時而有其氣皆曰戾氣戾氣成瘟沿門相傳又可所謂瘟疫也明乎此而傷寒與溫病可以不混宋元以來諸名家不知溫病傷寒之辨如龐安常卒病論朱肱活人書韓祗和微旨王實之證治劉守真之傷寒醫覽傷寒直格張子和傷寒心鏡等書每以傷寒之法治溫病用麻桂等方於心不安別立通聖九味羌活雙解等方甚至辛溫藥中加苦寒皆非理也近時論溫病者張景岳吳又可喻嘉言三家景岳以溫病為傷寒無足論喻氏有火症斷不至化為寒病之說分晰極清而亦用辛溫辛熱之藥是但能治春初伏氣之溫而忘乎主氣之溫病也又可直斷溫熱之原非風寒所中一以闢穢為治彼當崇禎凶荒兵火之時但能治戾氣之瘟疫忘乎伏氣主氣之溫病也兩家詳於治溫者各執已見不能融會貫通如此後之治溫病者將何從取法哉幸也葉天士出而剖晰分明謂傷寒從表入自太陽經膀胱始當從六經論傳變溫邪自口鼻入自手太陰肺經始當從三焦論重輕傷寒必困其陽當溫散以救陽得汗而寒解溫病必爍其陰當辛涼以救陰得汗而溫亦解大綱之眉目既清三焦之治可按部而理矣試言上焦溫邪首先犯肺逆傳心包肺主衛心主營肺衛見證舌白咳嗽口渴脈右大微惡寒甚則發疹當以辛涼之品輕則銀翹竹葉蒡桔重則石膏知母元參心營見證舌紅或黑神氣模糊或見血甚則見癍當以清營之劑輕則芩連丹梔赤芍重則犀角牛黃麝玳紫雪此皆上焦見證也方主衛者銀翹散兩方白虎湯化三方主營者犀角地黃湯又合銀翹湯五汁飲梔豉湯清寒清營牛黃至寶紫雪共約治上焦者十方次言中焦陽明為市病至四五日後必傳陽明而況平日積滯者最多積在腑則溫熱亦引而傳於腑其見證胸痞拒按口燥脈沈實承氣症也然而變化者十餘方胃實腸虛用大黃而去芒硝為小承氣胃虛腸實用芒硝而去大黃為柴胡芒硝腸胃實而不痞輕用硝黃去樸實為調胃承氣虛者加三參為新加黃龍兼上焦者加瓜蔞杏仁石膏兼心營者大黃湯化牛黃丸兼小腸小便不通大黃同芩連丹地苦泄之液涸甚者硝黃同元參地麥合用名增液皆承氣變法也若在經見證脈必洪大浮躁白虎三法外又有竹葉石膏化癍湯兩方此皆中焦見證化方也若傷脾者必發黃其病最急茵陳梔子大黃湯急救法也下焦之病見於肝者痙厥見於腎者煩而不寐治痙者宜龜甲鱉甲牡蠣阿膠等治煩者黃連阿膠地芍共約十方皆從定風珠復脈黃連阿膠數方變化壯火盛者不得用定風珠復脈邪少虛多者不得用黃連阿膠除虛痙不得用青蒿鱉甲若夫葉氏闕失在無消食消痰蓋溫病初起豈無夾食當用保和之類豈無胸滿夾痰當用陷胸之類者葉氏方中獨闕而芳香化穢甘寒生津二法實足為溫病死中求活之方故吳又可能盪滌而短於養津香化能治黎霍而不能治高梁葉天士能柔和而短於消痰消食能治高梁而不能治黎霍此定論也在今日讀兩公書者去其偏而救其弊何不可互參歟問治病必先定病名而後可按證立方王叔和雖不能自立溫病之方而傷寒例中立溫病名目九條能一一分晰其見證歟吳又可著瘟疫論瘟溫二字能詳辨歟溫病始於上焦能言其所以然歟溫病之因與傷寒分別處安在明乎死症之所以然而後可救其生溫病之死法有幾能歷歷詳言之歟溫病不用麻黃髮汗者曷故而冬溫病萎蕤法獨用麻黃者曷故何者為癍何者為疹能詳其所生所發之源歟或曰宜托或曰宜化能剖其宜托宜化之故歟醫家以實事應人之求瞭然於心者先當了然於手溫病有風溫有溫熱有溫疫有溫毒有暑溫有濕溫有秋燥有冬溫有溫瘧共九條王叔和以一切外感敘於傷寒例中悉以傷寒法治之貽惠無窮今按風溫者初春陽氣始開厥陰令行風夾溫也熱者春未夏初陽氣弛張溫盛為熱也溫疫者厲氣流行多兼穢濁家家如是若役使然也溫毒者諸溫夾毒穢濁太甚也暑溫者正夏之時暑病之偏於熱者也濕溫者長夏初秋濕中生熱即暑病之偏於濕者也秋燥者秋金燥烈之氣也冬溫者冬應寒而反溫陽不潛藏民病溫也溫瘧者陰氣先傷又因於暑陽氣獨發也瘟疫論一書又可特論瘟疫一端瘟字從溫之半仍屬熱病但只指厲氣為病耳不可以統治四時之溫病也試言溫病起手太陰之故夫天地一陰陽也若在時節一寒暑也而寒暑之成由風變也自秋而冬風從西北方來乃觱慄之寒風寒必傷陽膀胱足太陽府也寒邪郁遏陽氣而為頭痛惡寒之傷寒自春而夏風從東南方來乃解凍之溫風溫必傷陰肺經手太陰藏也溫邪郁遏陰氣而為咳嗽自汗口渴身熱之溫病故傷寒從太陽經肌表始由表而里溫病從太陰上焦始由上而下一縱一橫而寒熱之病情彰矣故曰水火者陰陽之徵兆也南北者陰陽之極致也天地之陰陽和平而萬物生人身之陰陽和平而百病卻一有所偏即為病偏於水者病寒偏於火者病熱燭其病在水也溫之熱之燭其病在火也涼之寒之各救其偏以底於平而醫之能事畢矣雖然不明乎溫病所以死之故將何以救其生夫溫病死狀大略不外五條一曰火勢燎原血從上溢肺之化源絕者死二曰熱入心營心神內閉內閉外脫者死三曰陽明太實土剋水者死四曰肝鬱發黃黃極則竅為閉穢濁塞竅者死五曰在下焦者無非銷爍津液涸盡而死也明乎此病既瞭然於心藥可瞭然於手下矣若夫溫病發汗不用麻黃之故可罕譬而知之今夫冬令嚴寒西北令行也西北風為主風見之不雨風轉東南而雨來矣春夏溫暖東南令行也東南風為主風見之不雨風轉西北而雨至矣人之汗以天地之雨名之夏令安得用辛溫之麻黃髮表之藥乎且夫汗也者以陽氣為運用以陰津為材料陰津有餘陽氣不足又為寒邪殺厲之氣所搏不能自出必用麻桂辛溫味薄急走之藥以運其陽氣而汗始出故傷寒一書始終以救陽氣為主若陽氣有餘陰津不足又為溫熱升發之氣所爍而汗自出或不出必用羔知冬地辛涼甘潤之品培養其陰津為材料以為正汗之地故治溫病者始終以救陰津為主至萎蕤用麻黃雖感冬時之溫仍有冷風外束也故以石膏治溫麻黃達表或溫病而誤發太陽經之汗其人熱甚血燥不能蒸汗溫邪鬱於肌表血分必發癍疹不知手經本是逆傳手太陰病不解本有必傳手厥陰心包絡之理故溫病中發疹者十八九發癍者十二三癍乃純赤大片為肌肉病胃主肌肉胃病也赤為營色故化以石膏知母亦可加犀角元參所謂主以鹹寒佐以苦甘法也若夫疹系紅點高起系血絡中病肺病也當主以銀蒡芳香透絡薄翹辛涼解肌甘竹地元參甘寒清血一皆主以化法為正彼吳又可出一托裡舉癍法用歸升柴芷山甲溫燥之品當春夏陽升時更升陽氣能不畏其爍津液乎此不通經文之過也宜戒用之一論寒暑由乎風變及寒風傷陽溫風傷陰之故詢是特識二論溫病發汗不用麻黃或用麻黃一節理明辭暢三葉氏溫熱論中有瑣碎小點淡紅色非屬陰癍即屬虛癍之說似宜補托如加減復脈之類亦托法也若又可之託里舉癍溫燥升發斷不可從王旭高注問溫病上焦肺衛心營外尚有何證何方中焦脾胃外尚有何證何方下焦肝腎外尚有何證何方今人論舌苔較細古人能分辨其見證歟甘寒苦寒鹹寒能分辨其當用歟辛涼與香化用法能言其故歟古人每用敗毒散起首或陶節庵柴葛解肌其宜安在其禁安在今人每用吳氏達原飲起首其宜安在其禁安在白虎承氣復脈三方之禁能詳言歟小兒麻疹之類與癍疹同源歟婦人胎前產後之溫病丹溪謂宜先補氣血景岳謂宜急清外邪內食能獨出手眼歟平日明白辨之臨時庶應手用之上焦營衛外有夾痰證咳喘苔膩脘悶宜小陷胸湯有夾飲症煩躁面紅苔黃宜大陷胸湯有膈間症舌微黃寸盛懊憹欲嘔宜梔豉湯痰涎湧甚者宜瓜蒂散有液涸症口渴白沫宜五汁飲中焦脾胃外下後汗自出下既傷陰汗又泄陰當復其陰宜益胃湯下後無汗脈數宜清燥湯加沙參梨汗牡蠣懊憹小便不利宜梔子柏皮湯渴飲舌燥發黃茵陳蒿湯證未可下小溲短宜冬地三黃湯下焦肝腎外少陰心煩不得臥宜黃連阿膠湯陰中伏熱夜甚者宜青蒿鱉甲湯瘀血漱水便黑者宜犀角地黃湯少腹堅滿蓄血宜桃仁承氣抵當便膿血者宜桃花粥少陰胸滿心煩者宜豬膚湯咽痛者甘桔湯少陰咽瘡苦酒湯試言舌苔舌絳不渴夜甚乃入營的候清營絳而中心黃者當氣血兩清玉女純絳鮮紅急滌心包清營牛黃中心干絳兩清心胃化斑元犀尖獨干絳專泄火腑冬地三黃舌絳而干當濡胃陰五汁絳而枯萎急用膠黃干絳無色急投復脈以上仍宜脈症合參若舌絳兼有白苔或黃白相兼邪仍在氣分絳而滑苔濕熱熏蒸忌血藥膩補邪必難解若夫溫家用方經云風淫於內治以辛涼佐以苦甘熱淫於內治以鹹寒佐以甘苦甘寒如麥地石膏梨蔗之屬苦寒如芩連知柏山梔蓋鹹寒保腎水而安心體犀角金汁苦寒通火腑而瀉心火連梔黃柏甘寒則養胃液而保肺陰加以芳香化穢濁而利機竅麝香冰片鬱金雄黃是從仲景溫化之外立一涼化法門搜剔絡中之穢最為微妙活人敗毒散柴葛解肌湯是冷風外罩肌肉溫邪內伏於裡其症必先惡寒骨節煩疼立此法者先去其新感之寒再理其溫然而陰虧者宜禁自汗者宜禁若夫吳氏之達原飲達募原之邪其見症所謂厭厭懾懾苔如白粉然惟強壯實體者宜之液枯者禁火重者亦禁白虎之禁脈沉細者禁不渴者禁汗不出者禁承氣非實熱蔽錮血氣俱結者不可用復脈之用在邪少虛多陰虛欲痙壯火尚甚者禁之若小兒麻疹瘄痧與溫邪之疹無異皆屬熱邪犯肺但疹之限期最迫只有三日前人有痘宜溫疹宜涼之論實為確見惟溫疹更甚於小兒之風熱疹當先以辛涼清解後以甘涼收功今夫春升秋降天地之常理也況病溫者下焦之精氣本虛當春升之令下虛之體再升其少陽主氣能無下竭上厥乎治溫疹者忌麻黃四河柳之辛溫傷肺尤忌羌防柴葛之表散升提誤用必致喘咳欲厥救其誤者仍宜用辛涼之品加苦桔旋覆上升下降甚則白虎加旋覆杏仁若癍為胃病已詳言之婦人胎前產後之溫病又當分別言之朱丹溪曰產後當大補氣血即有疾病從末治之一切病多是血虛不可發表是原於仲景亡血禁汗之條張景岳曰產後表邪宜解火邪宜清內滯宜消此原於仲景小柴胡承氣等法是二子之論不可偏廢然而產後自有妙法妙法云何手揮目送是也手下所治是實症目中心中意中註定是產後識症真對病確一擊而罷如病從上焦來治上不犯中藥不可輕須用多備少服法外感已即復其虛所謂無糧之兵貴在速戰若畏產後虛怯用藥過輕延至三四日後反不能勝藥矣如腹痛拒按則化瘀喜按即補絡快如轉丸其六氣為病除傷寒遵仲景外當於溫熱條中三焦救之斟酌輕重而急用之所謂另出手眼者不外是矣顧產後熱病之難更有故蓋溫經之藥多能補虛而補虛之品不能清熱此則復脈三甲定風等法能補前人之未備而產後陰氣大虧之熱症可相機而用矣若夫類白虎一症東垣用當歸補血湯是勞役傷陽氣之的方產後之妙法也而胎前一切病仍各從見症應清則清應下則下斷弗拘執思過半矣一宜與葉氏溫熱論中舌苔一段合看二手揮目送四字妙妙王旭高注問內經諸痙強直皆屬於濕其義安在仲景治痙幾方能舉其要歟今日之治痙可以通用乎痙瘈癇厥四症分別處何在痙病之寒熱虛實能歷歷剖分之歟痙病亦有六氣所感歟俗傳小兒驚風分明是痙俗傳產後驚風分明是痙可一一詳言之歟此症為時邪變症最多當細辨之內經云諸痙強直皆屬於濕此濕字風字傳寫之誤也痙症現象皆風木剛強屈幼之象濕性下行而柔木性上行而剛濕非無痙也而濕字不能包括痙病方中行痙書十八條除素問千金二條外其餘皆仲景之言其論脈二條曰痙脈緊兼弦曰痙脈伏堅直皆風木之象餘十四條風寒致痙居其十風家禁下一條瘡家禁汗一條新產亡血兩條皆內因也明乎此而外感內傷皆能致痙其理灼然何不可通於今日之治痙乎痙瘈癇厥四字最宜分別痙者強直之謂後人所謂角弓反張古人所謂痙也瘈者蠕動引縮之謂後人所謂抽掣搐搦古人所謂瘛也抽掣搐搦時作時止數日數月復發發則不治而自止者癇也四肢冷如水者厥也四肢熱如火者亦厥也仲景曰陰陽氣不相接故曰厥素問謂太陽所至為痙少陽所至為瘈蓋痙屬水而瘈屬火一則因寒一則因熱各不相謀也大抵痙瘈癇厥四症皆當以寒熱虛實辨之六淫致痙實症也產婦亡血病久致痙風家誤下溫病誤汗瘡家發汗皆虛痙也風寒風濕致痙者寒痙也風溫風熱風暑燥火致痙者熱痙也俗傳慢驚風者虛寒痙也陰液虛而本臟自病者虛熱痙也後人皆以痙名其實寒為痙而熱為瘈仲景剛痙柔痙之論為傷寒者而言未嘗議及瘈病故抱摠在寒水一門兼風則為有汗之柔痙蓋寒而實者也除寒痙外皆瘈病之實而熱也治痙宜用剛而溫治瘈宜用柔而涼痙而兼瘈水極而似火也瘈而兼痙火極而似水也此其大略也欲細分六氣內傷之條目先當明辨痙瘈之九大綱九綱云何一曰寒痙仲景之太陽病身體強𠘧𠘧然脈沉遲有汗者為柔痙因其風多寒少而用桂枝湯加味無汗為剛痙屬寒用葛根湯內有麻黃桂枝而不用麻桂立名者病已至陽明也若冷風咳嗽致痙者用杏蘇散一曰風溫痙即瘈症也當陽氣發泄之時君火主氣之候輕則用辛涼輕劑銀翹散重則用辛涼重劑白虎湯傷津液者加地冬神昏者用芳香開膻中如清宮牛黃紫雪愈後用三才六味以復其津咳者用桑菊飲此症最忌辛溫一曰溫熱痙此其病發於夏至之前六淫之火氣銷爍真陰而致此症較前症重而多治法一如上但藥之淺深輕重視病之淺深輕重而已一曰暑痙其症發於夏至以後其時二氣發泄邪之來也如奔馬其傳變也如擊電如身熱頭痛項強無汗暑兼風寒宜香薷飲有汗者用銀翹重加桑葉咳用桑菊汗多用白虎脈芤喘者用人參白虎身重汗少用蒼朮白虎脈芤汗赤多言喘咳欲脫用生脈神識不清用清營加鉤勾羚角丹皮神昏者紫雪牛黃勢輕者清絡飲一曰濕痙其症有寒有熱寒濕瀉久作癇五苓散或三仁湯濕火入心包清宮去蓮麥加赤小豆重者紫雪銀翹馬勃葦莖加滑杏寒濕苔白經絡拘急桂枝姜附余見苔黃手足瘲者用黃連瀉心亦愈一曰燥痙燥氣化火銷爍津液本能致痙證略似風溫正秋時涼風外罩之症宜辛涼潤有伏暑則兼濕宜苦辛淡燥氣化寒脅痛嘔吐法用苦溫佐以甘辛一曰內傷飲食痙即俗所謂慢驚也必先由吐瀉有脾胃兩傷者有專傷脾陽專傷胃陽者有傷及腎陽者參苓白朮四君六君異功補中益氣理中等皆可選用虛寒甚者理中加丁香肉桂肉果訶子類因他病傷寒涼者亦同此例一曰客忤痙此則因驚嚇而致者也蓋小兒神怯氣弱見非常物聽非常聲或失足落空百中一二如謂皆因驚嚇而致則謬矣其症發熱面青時為囈語四肢蠕動宜復脈去參桂薑棗加丹皮丹參犀角補心之體配心之用便結加元參溏加牡蠣汗多神不寧恐懼者加龍骨整琥珀硃砂然必得確情而後用之一曰本臟自病痙治此者一以育陰柔肝為主以上所謂外感痙即今日俗所傳小兒驚風之痙也以上所謂內傷痙即今日俗所傳產後驚風之痙也蓋小兒易痙之故一由肌膚薄弱臟腑嫩小變傳最速一由近世不明六氣一見外感即與發表既痙之後重用苦寒雖壯男壯女誤汗致痙者多矣寒為痙而熱為瘈一語破的王旭高注問濕溫之病其所由成者何因濕溫見症以何證為提綱其不能速愈者何故忌汗者何故忌下者何故忌清潤者何故治當以何方為主方上焦之變症何方中焦之病何症何方其蔓延三焦之病亦分氣血治氣分者何方治血分者何方濕溫並治者何方病至下焦與溫熱病異處何在當斡旋者何方此病今人混稱癉瘧久矣必須詳辨明晰庶幾挽世之謬暑兼濕與熱者也蒼瘦而黑之人陰虛而火旺感暑之熱而即發者為暑溫肥白麵黃之人感暑之濕不即發至秋後發者曰濕溫今人謬言癉瘧其實皆濕溫也濕溫所由成濕重熱輕熱伏濕中而成也其見症頭痛惡寒胸悶不飢午後身熱狀若陰虛而必以舌白不渴脈細而濡面色淡黃為提綱蓋惡寒身痛頭痛發熱傷寒似之脈濡則別於傷寒矣舌白不渴面黃則並非傷暑之偏於火者矣此濕溫之的症也濕閉清陽之道則胸悶不飢濕為陰邪陰邪旺於陰分故與陰虛同午後之發熱濕性氤氳黏膩非若寒邪之一汗即解溫邪之一涼即退其症較之溫病勢最緩而實重故難速已世醫不知其濕溫見其惡寒頭痛身熱以為傷寒也而汗之汗傷心陽濕隨辛溫表藥蒸騰上逆內蒙清竅則神昏上蒙清竅則耳聾目瞑不言濕症之所以忌汗也見其中滿不飢以為停滯而大下之誤下則傷陰而重抑脾陽之升脾氣轉陷濕邪內漬故洞泄濕症之所以忌下也見其午後身熱以為陰虛而用柔藥潤之濕為膠滯陰邪再加柔潤陰藥二陰相合同氣相求遂有錮結而不可解之勢濕症之所以忌清潤也治之之法宜三仁湯用杏蔻樸半等先開上焦肺氣肺主一身之氣氣化則濕亦化用滑石通草等分利下焦此治濕之正方也濕氣瀰漫本無形質最忌以重濁滋膩之藥治之愈治愈壞其有熱感肺胃營分者咽喉阻膈而痛銀翹馬勃牛蒡射干濕鬱氣分者為呃宣痹法用射干枇杷葉鬱金香豉喘促者葦莖加杏仁滑石此皆上焦之變症治法也中焦之病略同於暑病不食不飢不便由濁痰凝竅而痞宜半枳開氣分之濕結芩連開氣分之熱結杏仁開肺大腸之痹若其蔓延三焦舌滑微黃者邪在氣分仍以手太陰一經為要領蓋肺與大腸一家氣化則暑濕俱化肺能通調水道下達膀胱肺痹開則膀胱亦開治肺而胃與膀胱皆在治中此三石湯微苦辛寒用滑石寒水石石膏杏草宣氣分之用用竹茹通絡金汁銀花敗暑之熱毒而兼芳香之治也若邪氣久留舌絳苔少熱摶血分用苦辛寒法清宮湯加知母銀花竹瀝以治血分此暑病延三焦氣血分治之法也濕溫化火亦宜照此用之若夫伏暑舌白胸痞自利嘔惡濕之見症也潮熱煩渴汗出溺短熱之見症也熱處濕中濕蘊生熱濕熱交混非偏寒偏熱可治以杏仁滑石通草宣肺膀胱之濕厚朴苦溫瀉濕滿芩連清裡止濕熱之利鬱金芳香走竅而開閉結橘半化痰止嘔三焦之邪皆得分解此濕溫並治之方也若病至下焦濕邪深入厥陰肝少陰腎與暑溫同法若陰分大虛則與濕熱下焦病者同法此外若正氣誤傷於藥邪氣竊踞於中錮結不解攻補難施須旋轉清濁之法則來復丹復陽於下寒熱相配陰陽互濟有扶危拯逆之功陰液與元氣俱傷者可用三才兼補其陽若飲留脅下者旋覆蘇子霜二陳甚則控涎丹此皆濕溫與溫熱不同處亦即斡旋之法也而奈何今人混稱癉瘧也不知此症與陰氣先虛陽氣獨發之旨迥不相侔謹明辨之以俟有識者裁焉又有一種膏粱嗜酒體肥之人時值春末夏秋觸染溫邪與濕相摶亦屬濕溫王旭高注問濕之體質何物能詳言歟仲景論濕十數條多用溫藥豈濕之體本寒歟抑別有濕熱之見症歟濕之在人有中有傷有外感曰風濕有直中曰濕痹有內生曰痰濕能條分縷晰其所以然歟濕在上焦傷肺之見證若何應何治法濕在中焦傷胃陰之見證若何傷胃陽之見證若何傷脾陰之見證若何傷脾陽之見證若何宜各詳治法濕在下焦傷肝腎之見證若何宜詳治法試明辨之嘗讀易曰水流濕濕之體質水也在天之陽時為雨露陰時為霜雪在山為泉在川為水包含於土中者為濕在人則與肺脾胃肝腎合以人與天地異出同源土為雜氣水為天一所生無處不合者也今人競惡濕之病人而不知人為倮蟲之長倮者土也亦藉濕以為生長者也故喻氏有瘦人以濕為寶之論非探本者不能言仲景論濕十餘條其出方有四桂枝附子湯桂枝白朮湯麻黃白朮湯甘草附子湯大都夾風之病多其所謂風則冷風也故多用溫法其濕痹一症留於關節者以利小便為主隱非五苓在於言下其身色如熏黃者屬熱隱非麻黃赤小豆湯甚則梔子柏皮湯茵陳蒿湯在言下其丹田有寒胸中有熱渴欲得水一症有瀉心湯意在言下斯三者皆濕熱也讀仲景書可不明辨乎或問中濕風濕傷濕之別張石頑曰山澤陰雨熏蒸之氣人氣虛而冒襲者曰中濕脾腎受病也其見證或身痛或身色如熏黃脈緩治之以燥勝濕兼利小便汗出當風濕鬱腠理名曰風濕此膀胱與胃受濕也其症惡風不欲去衣支節痛脈浮澀治之以風勝濕兼取微汗若水穀內蘊肺虛不能化氣脾虛不能散津或飲寒飲冷或酒客中虛內外相合客邪既從表入伏邪又從內發此脾胃受濕也其症或痞滿或嘔吐腹脹便泄治之以和脾胃此外治濕之法在上焦犯肺者氣不得化水反剋火肺病心亦病救上焦者以開肺氣救心陽為主金匱太陰中暍身熱疼痛脈微弱此夏月傷冷水水行皮中所致用瓜蒂吐之此濕鬱於肺之一證也又寒濕傷陽形寒脈緩舌淡白滑不咳經絡拘束桂術姜附湯此亦濕鬱於肺之一證也皆屬上焦中焦之病土最惡濕治法不外開溝渠運中陽崇剛土作堤防若傷胃陰則口渴不飢潮熱得食煩加復胃陰者莫若甘酸化陰用麥冬麻仁白芍首烏烏梅知母傷胃陽者嘔吐不食膈脹胸痛渴不欲飲味酸變濁加減人參瀉心湯濕傷脾陽在中則不運痞滿以茯半培陽土以吸陰土之濕厚朴苦溫瀉濕滿連以滲濕通草利水若木來剋土者腹脹溺澀便溏似滯四苓加厚朴秦皮濕困脾陽甚者肢冷苔灰自利舌謇神昏四苓加木瓜草果厚朴若中焦痞滯者草果茵陳湯甚則面黃支冷陽虛者茵陳四逆同服若舌灰脈遲不食寐者椒附白通湯皆所以治脾陽也若脾陰為濕傷者舌先灰滑後反苔燥大便堅結治以連芩白芍枳實半夏以上皆所以治中焦之濕也若濕傷於下邪水旺一分正水虧一分若跗踵者治以鹿附湯升督脈之陽佐以兔絲獨一味草果清太陰獨勝之寒以醒脾陽俾地氣上蒸白苔可除若脾敗而及腎者安腎丸以鹿茸補督脈附韭補真陽苓朮滲濕所謂釜底增薪法也又有痿弱不振肢體麻痹便血者苓薑朮附湯及古方黃土湯夫腎之真水生於一陽治少陰之濕一以護腎陽使火能生土以化濕一以泄膀胱之積水從下治亦所以安腎中真陽也一以升脾陽從上治亦所以使水不沒真陽也此治少陰之濕也若濕太過水能泛木木無生氣自失其疏泄之任治厥陰之濕復其風木之本性便能疏泄此治厥陰法也皆下焦法也問大易水流濕火就燥二句之義能暢言歟內經少秋傷於燥一句後人遂疑燥不為病得毋誤歟夫寒熱燥濕皆有勝氣復氣燥病勝復二氣能分別歟喻西昌轉補秋傷乾燥二句有所本歟自立清燥救肺法其用當在秋之何節歟以此治燥法果該備歟燥症之見於三焦者何證分治者何方能詳言歟燥病之變症能類舉一二歟素問有燥極而澤能言其故歟宋元明書罕言及燥今人尤混當細剖之聖人於干之九五示人以後天太極之象此一節當連讀急讀言下儼然有一活太極在目前若分讀則無意味緩讀則失神理水流濕二句有三義既是水則自然流濕既是火則自然就燥一義也水之流濕已有就燥之機火之就燥已有流濕之機又一義也水不能流濕有火為之宰而濕乃流火不能就燥因水為之爍而燥乃就又一義也醫家明乎此二句急讀之故中藏三義之說治濕當常目在燥治燥當常目在濕余曾於瘡恙驗之東南風起則滋水淋漓頃之風轉西北乾枯燥癢此其證也內經少秋燥一句後人疑燥不為病固屬誕妄而知論燥者如戴人云休治風兮休治燥治得火時風燥了亦僅知以潤藥治燥以清藥治火是治燥之復氣而非燥之勝氣也復氣云何大抵五行之理克之太過其子必為母復仇知冬傷於寒其勝氣是寒勝熱用麻桂姜附治寒之勝氣也寒水剽火克之太過則火之子為母復仇白虎承氣治胃土即寒之復氣也燥氣亦然燥屬金金屬陰屬寒金能剋木克之太過木之子火也為母復仇而化火故治燥之勝氣屬寒治燥之復氣屬火喻西昌補秋傷乾燥冬生咳嗽二句本生氣通天論曰秋傷於燥上逆而咳發為痿厥數語其自立清燥救肺湯甘寒潤液治諸氣膹郁諸痿喘嘔之因於燥者亦以治燥之復氣而非治燥之勝氣也大抵秋分以前屬長夏傷濕之餘氣為病秋分以後小雪以前屬陽明燥氣為病內經曰陽明之勝清發於中左胠脅痛溏泄內為噎塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便噎塞而咳據此經文燥令必有涼氣感人肝木受邪而為燥也性理大全謂燥屬次寒知燥病屬寒與傷寒同類經以寒淫所勝治以甘熱此則燥淫所勝治以苦溫用苦溫辛溫解表與冬令麻桂姜附雖不同和中攻裡則一故不立方且如夏暑熏蒸肌肉潮潤冬寒肅殺乾槁燥冽深秋氣涼肺金應之肌膚亦燥火令無權奈何諸賢皆謂屬火大相逕庭也知此則喻氏此法但可治復氣之燥而不可謂該備也欲求該備先論上焦勝氣為病初感必在肺衛清氣分者桑杏湯用桑杏象貝香豉以化其表用沙參梨皮梔子以清其本咳者桑菊飲如燥傷肺衛陰分北沙參麥冬湯用甘草玉竹桑葉扁豆清竅不利用薄荷桔梗黑梔綠豆衣牛蒡枯草所謂火鬱發之如初寒咳嗽痰稀鼻塞無汗此誠燥之正病也用杏蘇散治之皆治上焦法也中焦之病金能剋木木病與金病同見胸脅作痛甚則疝瘕痛以柴胡達少陽之氣即所以達肝木之氣合桂枝而外出太陽加吳萸川楝茴香苦溫通降若病在陽明裡實而堅者有二法脈仍短澀兼緊面青此未從熱化也用苦溫下之如金匱大黃附子細辛湯及天台烏藥散加巴霜之類如脈已數而堅面赤舌黃參之他證皆見火象此已從熱化也用苦寒下之如三承氣之類輕用硝黃亦可病在下焦燥氣結於血分而成癥者無論男女皆當以化癥回生丹主之經又曰燥淫所勝男子㿗疝女子少腹痛故燥症中下焦病癥疝為多所謂燥之變症也亦自然之病也然則變症其盡於此乎未也中燥之極重者如霍亂寒疫蓋風火暑為陽邪與穢濁相參則為瘟疫濕燥寒為陰邪與穢濁相參則為寒疫其證支麻轉筋逆冷吐瀉甚至反惡熱大渴涼飲經謂霧傷於上濕傷於下此症乃燥金寒濕之氣直犯筋絡由大絡別絡內傷三陰藏真所以轉筋入腹即死吐瀉者陰陽逆亂也諸痛者燥金濕土之氣所摶也渴思涼飲者仲景謂自利而渴者屬少陰虛故飲水自救也陰邪上逼陽不能降所謂戴陽也喜涼惡熱者飲邪內踞陽氣無附欲外散也陰病見陽症水極似火也辨此症者以當臍痛甚拒按者為真陰症治之之法以附桂椒薑草果吳萸良薑驅其內走之寒保住陽氣烏木降香雄黃薤白丁茴等芳香去穢用細辛石菖等以開其道一面由真臟而別絡大絡外出筋經以達皮毛一面由臟絡府絡以通六腑外達九竅俾穢濁陰邪一齊立解所謂離照當空群陰退避今人以謂痧症廖矣若夫燥極而澤一語以水為金子土為金母故也其病多見於寒濕伏暑門中如腹痛嘔吐之類均苦溫治燥之正法也學者宜知濕有兼熱兼寒暑有兼風兼燥燥有熱化寒化先將燥濕分開再將寒熱細細辨之庶幾胸有準的而手下絲絲入扣乎問瘧疾之因何由而發瘧疾之理何書最詳能細述歟歷來論瘧何家最精何方最妙能縷述歟溫瘧癉瘧古方甚著何以不驗歟痎瘧夜瘧其說甚多能辨其故歟瘧在少陽一經其輕重深淺亦分上中下三焦臟腑論治能分剖而明辨歟外感有風寒暑濕內傷有痰食瘀阻有汗無汗新久虛實能條分縷晰歟瘧母瘧勞能詳病因治法歟其逐層條對毋忽瘧之因由於夏暑瘧之理詳於內經經曰陰陽上下交爭虛實更作陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷巨陽虛則腹背頭項痛三陽俱虛則陰虛骨寒而痛寒生於內故中外皆寒陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實陽盛則外熱陰虛則內熱故渴而欲飲水也此皆得之夏傷於暑熱氣藏於肌膚之內腸胃之外營氣之所舍也此令人汗孔疏因得秋氣汗出遇風及得之於浴水遂閉汗孔暑毒無從發泄故氣舍於皮膚之內與衛氣並居衛氣者蓋日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作其間日作者由氣之舍深內薄於陰其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日而作也讀以上經文明朗朗如月後人著作不昌斯言矣以上瘧因惜無治法不得不求之後賢而後賢亦有精當之論可與經文並行者朱丹溪曰無痰不成瘧瘧由暑邪舍於營衛腠理不密復遇風寒鬱閉汗孔郁汗成痰寒熱相搏故為瘧其治法無汗者要有汗散邪為主兼補正氣有汗者要無汗扶正為主兼散邪氣按丹溪補出痰字所以易於纏綿有汗無汗最當明辨於後秦元宮曰少陽膽為震為乾之長子諸陽所從邪欲入陰而拒之遂積於經隨氣行少陽而與邪爭二陽三陽並而入內為援由是外無陽而戰慄頃之陽從外出則大熱勝復之道也間日一發者戰後兩衰不能爭休息而更戰也按此條可作經注又曰四序五行皆順生惟夏交秋為火剋金雖有坤土間之熱極忽涼火未退而金受制庚日為伏是火未退而金潛伏也立秋後金令當權而木藉子之勢不肯受制於是金木相戰易曰戰乎乾是也瘧病者金木相戰也脈弦木強之徵也然必有外邪交構而禍作暑邪甚者黨木寒邪甚者黨金始則金先犯木木火退而身寒繼則木出相爭而大熱此其常也木火強者木先犯金先熱後寒變也但熱不寒者癉瘧木火太旺肺金束手無權不得不用石膏知母以瀉其子治法以助金為正理以講和為善術柴胡疏肝黃芩助肺金甘草調和半夏驅邪而陰用人參生薑補肺金為左袒使相和而止甚則膏知以助金歸桂以和肝若虛人胃嘔吐不堪用人參姜皮專補肺金使木不敢交鋒大兵壓勝法也露一宿者藉秋氣之助金也按此條精當奇確在諸家之上能清其界以上語諸家薛一飄曰瘧邪皆得自夏秋浴水悽風俞穴留邪與衛氣相遇乃作內經溫瘧論謂冬寒藏於少陰大暑用力而發皆紙上空談仲景之白虎桂枝用之不見其撤熱之功反見營熱煩躁之害石膏徒足郁邪桂枝反熱其營故不中病情余制一方治溫瘧癉瘧頗效名清瘧飲用青蒿炒蜀漆知母花粉淡芩鱉甲丹皮取蜀漆苦辛引達瘧邪知芩花粉苦鹽清肺胃之熱鱉甲丹皮辛鹽清鹽以破肝血其症自愈然不能速治不可急急則生變按此條知今日但熱不寒之癉瘧與古人方論不合當另出心裁溫瘧癉瘧三日一發為痎瘧以氣虛不能抵受暑邪邪氣深陷故也先哲皆以大補元氣為主立齋用參朮煨姜頓服即止丹溪用大劑補中益氣加煨姜亦妙其有不效者因暑邪未清先宜清暑益氣湯驅散暑邪補養正氣再用溫補其病在脾肝腎方詳下焦瘧中痎瘧夜瘧者諸書皆作陰分受邪惟汪石山謂陽虛陷入當用助氣藥加血藥引入陰分如四君加羌防柴桂升接三陽芎歸桃仁引入陰分以出還陽分按此條論夜瘧宜與分晰三四發後漸入陰分者從陽虛陷入宜上法若初起即發於夜是陰分受邪宜桂枝桃仁湯直散血中之邪薛氏清瘧飲追瘧飲亦治熱入營中之瘧夜瘧上焦之瘧舌白濁飲咳嗽頻仍寒從背起名曰肺瘧最忌小柴胡以肺去半表半裡甚遠不得引邪深入用杏蔻翹桑芩滑輕宣肺氣無使邪聚則愈肺瘧昏狂譫語煩渴者曰心瘧加減銀翹湯甚則牛黃丸紫雪丹心瘧中焦之瘧變化最多大約不外胃熱脾濕兩種濕瘧見瘡蒼朮白虎加草果此胃熱也胸中痞結邪漸入陰草果知母半樸芩粉薑梅湯此脾濕也惟草果能治太陰獨勝之寒能升邪使出樸半助之知母能瀉陽明獨勝之熱花粉佐之薑半開痞梅芩清熱和肝此從清脾達原兩方化裁而出實瘧門之主方用之善於剪裁可也傷胃陰者味變酸濁加減瀉心湯不復者麥冬麻仁白芍首烏烏梅知母胃瘧脾瘧多嘔熱聚心胸芩連枳芍薑半燥甚者牛黃丸脈濡腹滿肢冷露姜飲嘔吐噫氣腹鳴溏泄參薑草果青皮陳半久不止者氣虛補中益氣偏熱重者青蒿鱉甲飲少陽如傷寒者小柴胡熱多加花粉寒多加乾薑舌白脘悶肢冷渴喜熱飲濕蘊之故厚朴草果湯脾瘧下焦之瘧皆三陰痎瘧在太陰脾者腹脹不渴嘔水溫脾湯草果桂樸苓漆生薑在少陰腎者形寒嗜臥舌淡脈微扶陽湯鹿茸參附歸桂漆在厥陰者痞結氣逆欲嘔減味烏梅丸朮附參橘歸此皆下焦法也以上三焦風瘧惡風自汗脈浮桂枝羌活湯羌桂防草無汗加麻黃嘔加陳半風瘧寒瘧惡寒無汗脈緊麻黃羌活湯即前方加麻黃暑瘧面垢口渴熱退亦常自汗白虎湯暑瘧濕瘧小便不利骨節重痛而煩脹滿自汗滲濕湯加柴芩或胃芩湯加黃芩濕瘧痰瘧痰涎潮壅二陳加常山枳實柴芩痰瘧食瘧惡食吞酸噯氣膈中不寬平胃散加砂仁草果神麯青皮食瘧瘀阻即陰分夜瘧之一種桂枝桃仁湯瘀阻久瘧無汗屬氣虛宜撫元氣不宜散雖屬有汗仍身疼怕風此汗未徹仍須汗之初發多汗當清暑疏風無汗寒多風寒未散煩熱多汗暑熱未清氣虛者參朮苓耆人參養營湯血虛者何首烏散有汗無汗新久虛實瘧邪日久不散私結營壘於肝木之部名曰瘧母宜鱉煎丸常在左脅結癖其延久氣血衰而寒熱時作者瘧勞仍當從陰陽偏處調補問滯下之病古稱腸癖後世名痢痢字作順利解今以澀滯名痢者何居其所以澀滯者何故赤色者何故色白者何故赤白相兼見者何故色黑者何故色青者何故純血者何故如濃血稀薄者何故如豆汁者何故如屋漏水者何故自古論痢諸名家其精當可道者能詳述乎諸家皆謂濕火景岳石頑獨有寒冷一種其故安在厭食者曰噤口痢時發者曰休息痢當詳所因所治孕婦尤難皆宜辨經曰飲食不節起居不時陰受之則入五臟填滿閉塞下為飧泄久為腸癖言臟氣久滯不能運行津液移於二腸而為澼積崩迫陰氣受傷所致也審是痢疾古名腸澼今以痢名傳述之謬也欲其所以滯下所以五色當求之諸名家李東垣曰飲食起居不時損其胃氣則上升清陽之氣反下降為飧泄久則太陰傷少陰為腸澼寒冷傷中而脹者為飧泄宜溫熱消導濕熱傷中下濃血宜苦寒疏利風邪下陷宜升舉濕熱內盛宜分別裡急者宜下後重者宜調洞泄腸鳴脈細者溫收之稠黏澀滯脈有力者寒下之按此條前注經而後統論痢病最明晰朱丹溪曰赤痢自小腸來白痢自大腸來皆以濕熱為本按此條明金色白而火色赤王宇泰曰胃有濕熱拂鬱不化氣凝注大腸成白痢血凝注小腸成赤痢二腸均受赤白並下以大腸合肺小腸合心也初起實者必推蕩之通因通用也如失下五六日後脾胃虛難勝下白者平胃加楂檳枳芍芩連滑曲歸姜紅者芍藥湯加桃仁滑石枳殼青皮蒼朮以引血調氣純血脈弦風邪傷肝肝主血宜防風白芍湯痢如豆汁者此元氣大虛香參散加當歸粟殼赤黑相雜者此濕勝也按此條論痢甚明薛立齋曰久痢黃中帶青肝木刑脾土宜補脾平肝四君白芍黃而兼白子全母虛宜補脾胃用益黃散黃而兼黑腎水侮土宜補土製水六君加薑桂按此條明青黑色之所以然張景岳曰痢起夏秋濕蒸熱鬱本乎天也因熱求冷過吞生冷由乎人也氣壯而傷於天者鬱熱居多氣弱而傷於人者陰寒為甚寒者必虛熱者必實按此條似痢有陰寒一種周慎齋曰夏日太陰用事過食生冷積而不化積久成熱發於秋者陽氣入里攻之使發治宜苦寒燥濕滌熱佐以辛熱開鬱達氣故曰行血則便膿自已調氣則後重自除又曰肺主氣凝滯傷氣移熱大腸氣凝澀而成白痢心主血鬱熱傷血移熱小腸則血凝澀而成赤痢此二臟二腑之積熱也若胃傷於冷物則胃寒精氣不輸於脾脾不能散精幹肺津液留滯於胃為胃積症見嘔逆噁心便色如桃膠不臭右關沉細而緊當用樸桂萸薑木香虛者附子理中非二腸之積可比也按此條辨寒者屬胃積熱者是腸積又曰色黑有兩種焦黑者熱極反兼勝己之化芩芍湯送香連丸如漆有光者瘀血凝久桃核承氣湯按此條辨黑色更明張石頑曰劉李朱三家皆以痢主濕熱恣用苦寒蒙害至今未已曷知血色鮮紫濃厚者信乎屬熱若瘀晦稀淡及瑪瑙色者如陽虛不能制陰而下非溫理其氣則血不清理氣如爐冶分金最為捷法余凡遇五色噤口及瘀晦清血諸痢每用甘草乾薑湯專理脾胃肉桂茯苓專伐腎邪其效如神腹痛後重加木香檳榔以泄之飲食艱進兼枳實焦術以運之陰氣上逆乾嘔木香吳萸以溫之嘔吐涎水橘半生薑以豁之膿血稠黏茜根烏梅理之按此條合以溫法秦元宮曰秋時肺金氣欲降而小腸有火間不使達於大腸小腸丙火克庚金秋金燥故腹痛後重而氣不能通正治之法不過沙糖利小腸萊菔汁以通大腸加陳松蘿茶四五錢以瀉火淡關頭海蜇以潤燥則愈火甚閉結者用檳榔二三錢煎湯下黑金丸三四錢或酒蒸大黃飯丸三四錢亦可若其人肥甘過度瓜果炙煿煎炒熱毒遺積腸間肺氣斂降隨小腸之火而急奔大腸則如被火焚腹大痛痢不休煩躁口渴急須芩連檳柏大劑以救之脈必數而有力緩則腸胃腐爛若兼發熱脈浮者必有外邪用敗毒散熱服取微汗兼瘧者先治瘧先輩脾傳胃之說迂而未當此症腹痛是丙火克庚金與木剋土不同宜用通法不宜芍草歸等若純紅者熱入血分用涼血湯地榆槐花神麯酒炒各三錢煎七分藕汁一杯沙糖調服按此條明白曉暢勝於前輩從來論痢皆屬火而石頑景岳獨言寒涼者皆寒藥誤治而變之痢非痢之本病也因其始不急通大腸而徒用梔柏芩連腸仍未通而胃已寒或屢用香陳檳樸致火未除而氣已大耗未有痢疾起始而先虛寒者也此丙火小腸閉塞而腎燥肉蓯蓉為對症之的藥他如噁心厭食者曰噤口痢是濕熱之氣上塞於胃口也若未下者脈有力仍須大黃下通上自寬也若下過脈弱者養胃湯茉莉扁豆花連肉菖蒲根枳殼粳米炒黃米綠豆皮人參用老蘇梗乘熱泡藥再隔煮三四沸即服渴者加連一分銀花露溫服數杯亦妙服此不愈者胃氣大虛用升麻一錢炒蓮肉五錢人參三錢煎服此治噤口症也又如經年累月時作時止者曰休息痢因兜澀太早積未盡除之故宜再投蕩積之藥後調脾胃如虛者以調養之中微加消導藥仲景云下痢已瘥至其年月日後發者以積未盡也當下之餘用補中益氣加肉果煎送駐車丸多效至如孕婦痢疾裡急後重最為棘手只用蘇梗杏仁枳殼不宜檳榔黃芩可以重用中氣不和少加木香重用砂仁金銀花露宜多服不可缺也若夫純血如塵腐色如屋漏水大孔如竹筒唇如硃紅身熱脈大有力四肢腫冷及呃逆者皆不治問中風急症也先當分辨閉脫二症若何見症脫者何因閉者何因其次有中外風見症有中內風見症有風入腸胃見症有風入經絡見症有類中風見症有痰厥見症有中暑見症有客忤見症又有無病忽然風發見症以上十症各宜分別定方此症風外惟痰痰有從火化者有從濕化者皆宜明辨又此症初病時往往不能言切脈又為要務當分別詳細書之中風當先辨閉脫二證脫者見症口開目合自汗遺尿喘急此由真陰本衰不能外固其陽加以憂思勞心鬱火既久一值酒色過傷或觸大怒於是坎中之陽與雷電肝膽之火一齊衝擊而上卒然顛仆脾絕而口開腎絕而遺尿肝絕而目合心絕則自汗肺絕則喘促急治之法用奠坤湯此脫症也猶地震山崩也故不治者多亦有一臟未絕停七日而死者已上脫症外此皆閉症也閉者手握口噤目張暈眩昏迷此名中風有外內之別中外風者有六經見證脈浮惡寒發熱拘急不仁用錄驗續命湯即大青龍加芎歸人參也河間小續命即益以熟附黃芩防己防風其夾食者腹滿便閉用三化湯即小承氣加羌活此純實症也江以南極少間有之以上外風中內風者肝膽火鬱衝擊於上火盛風生狂風勃發其性剛急氣血大亂風火由下直上將胃中津液頃刻皆化為痰涎壅塞上焦痰因凝聚而心氣混濁難言者舌本乾燥也昏憒者氣血內亂也手足勁直或搖動者風能爍真陰也口眼歪斜者風入經絡也麻痹不仁者血痹不流也半身偏枯者經絡無血也此皆風從火出所謂內風也位在震巽左關寸之脈必弦急洪滑或數疾如木反侮金右寸亦弦數滑大史記倉公傳曰迥風其脈滑滑者內風發也巽風大旺自當以助金平木為要義以養血滋木為正治治宜緩風湯若飲食未消而風逼則痰食交結而胸滿作痛先用鹽湯探吐之口不開者勝金丹或側柏葉湯以上內風若內風入腸胃者金匱有風引湯及侯氏黑散取諸石屬金金能平本之義其冷食十日俾藥積腹中填塞空竅治法高出千古以上風入腸胃若內風入經絡及風息血不歸經筋被風燥手足不遂半身偏枯宜養血以潤之宜潤枯湯及煮酒方風入經絡若肥人素多痰濕脈緩或沉澀肢節重痛手足筋軟是痰濕積於絡中也宜桑枝湯痰入絡中又有類中風者不可不辨其人素多濕痰忽然氣逆痰塞牙關緊急是名痰厥中風者左脈浮弦此症右脈沉澀左脈和平亦有脈伏者以膽星木香為末灌之後用順氣湯若醉飽惱怒之後忽然昏迷右脈緊盛急用陳皮姜鹽湯調以消食健脾之品以上痰食又有暑天悶倒昏不知人冷汗出手足冷或吐瀉喘滿是謂中暑急用皂角末燒存性同甘草新汲水調下輕者香薷飲冷服大渴大熱者茅朮白虎湯以上中暑又有飛屍鬼擊卒厥客忤或吊死問喪忽然面青錯語牙閉口噤昏憒是名中惡急以蘇合香丸灌之以上客忤若夫似輕而實重毫無病苦忽然一手一足重不能舉心神如醉少頃復常其脈沉遲非風也是脾腎陽虛胃中有痰有時不運為後來脫症之根急急用六君培養以上陽虛此外內風一種內有痰從火化心中煩悶言語謇澀者經所謂風淫於內治以甘涼是症多陰虛瘦削之人肝火鬱熱而生痰招風宜先服竹瀝湯脾胃熱者用地黃煎若邪中經絡與痰氣相摶神暴昏脈暴絕者惟香藥能達經隧通神明然亦有寒熱之別其脈沉緩或遲或伏須用迴天再造丸或地黃飲子有脈數大有力或浮或滑須用蘇合香丸及至寶丹同一開法有寒熱各分虛者以四君湯送以上痰有火濕他如經絡中有死血濕痰留滯者宜活絡丹此症名論最多略舉數家喻嘉言曰河間指火為本東垣指氣為本丹溪指痰為本曷不曰陽虛邪害孔竅為本而風從外入者必扶身中素有之邪或火或氣或痰而為標耶故挾虛者補虛則風去挾火者清熱則風去挾氣者開鬱則風去挾痰者谿痰則風去按此條筆最該括然猶不敢別乎外風而言也薛立齋曰陽主氣以天地之疾風名之不必外感而名風也左半肝腎之居肝藏血主筋腎藏精主骨精血枯槁不能滋養故筋骨廢繆仲淳曰南方質多柔脆多熱多痰真陰既虧內熱彌甚煎熬津液凝結為痰壅塞氣道不得通利熱甚生風亦致卒僕按此二條皆言內風也張景岳曰人之根本真陰也陰虛有二陰中之水虛病在精血陰中之火虛病在神氣陽衰則氣去神志昏亂非火虛乎陰虧則形壞支體廢馳非水虛乎以神離形壞之證不求其源而治風乎宜培養真陰以救根本惟有實症者但察其因痰因氣而暫開之按此條分明補陰為主張石頑曰中風之脈皆真氣內虧即南方屬痰總由腎氣衰微不能主持是以脈不能沉隨虛風鼓激而見浮緩之象昔人云中風脈見沉伏亦有脈隨氣奔指下洪盛者當知中風者多體肥痰盛外有餘中不足加以房勞初中氣閉脈必沉伏少頃氣還脈見洪盛皆風火痰濕用事也大都中風之脈浮小緩弱者生堅大急疾者危蓋浮緩為中風之本脈兼緊則多表邪兼大則多氣虛兼遲則多虛寒兼數則多虛熱兼滑則多痰濕皆為可治之脈惟兼澀者為脈不應病多為危狀以痰症脈澀為正虛氣衰經絡閉滯難於搜剔也所以中風之脈最忌伏澀尤忌堅大急疾云問虛勞一症仲景金匱七方多偏重陽虛丹溪多用寒涼後人薛立齋張景岳李士材等多非丹溪之寒涼而是溫補又未必用仲景之方今人遵用立齋景岳等法又未必效其故何歟夫病有寒熱虛實豈容預定自宋元以來各家出入是非可詳晰言之歟近時名家治此病者能否有細膩沉著勝前人者乎抑或另出心裁因症論治可補前人之未備乎醫貴實效不必拘守前輩也其細參之虛勞一症古今治法各殊仲景七法卓然典型其失精家少腹急陰頭寒目眩用桂枝龍牡湯張石頑曰人身氣血全賴後天水穀滋生水穀入胃清者為營濁者為衛營氣不營上熱血溢衛氣不衛下寒精亡營衛和三焦各司其職而火自歸根熱者不然寒者不寒水穀之精微輸化而精血之源有賴矣以亡脫既憒恐下焦虛滑不緊乃加龍牡以固斂之以龍骨入肝斂魂牡蠣入腎固精皆收斂精魂之品入桂枝湯中則為固蟄封藏之本藥也若失精悸衄腹痛本方加膠飴為小建中裡急為營衛枯槁更加黃耆為黃耆建中此皆後天不足以調和營衛為主治後人專用滋陰降火未至於劇用此尚可挽回若先天腎虛者八味腎氣虛煩不眠酸棗仁湯乾血者䗪蟲丸惟薯蕷丸專治表邪不解誤用涼藥傷犯肺胃自上而下之虛勞秦元宮曰仲景用建中復脈以扶胃而建立中氣以胃為氣血生化之原其人稍見膈虛內熱神氣不旺以建中未雨綢繆桂枝和衛白芍和營調劑陰陽而以飴糖甘草大棗補胃土以生薑生髮多服胃氣旺而上升於肺肺行降下之令而主水所謂地氣上為云也天氣下為雨山澤通氣之道也故一則曰脈大為勞又曰浮則無血大則無氣又曰脈極虛芤遲從未聞數脈也亦未聞兼咳嗽也失此不治而陰火上升脈之遲者變而為數火上弄金而咳嗽起豈可仍用桂枝按此條論仲景所治非今日脈數咳噘陰火上升之虛勞也後賢論治或以謂補氣者當補肺之母脾補血者當補肝之母腎又曰土旺而金自生勿拘拘乎保肺水盛而大自熄勿汲汲乎寒涼東垣謂人參補肺氣旺則四臟之氣皆旺精自生而形自盛白飛霞謂多服人參回元氣於無何有之鄉肺虛喘嗽者並宜服之王好古謂肺熱還傷肺王節齋謂虛勞服參耆者必死按古書如聚訟愚以謂無脈證而論治猶無題而論文宋元清名家論理極是施之實事皆屬似是而非惟沈朗仲曰陰虛多火之人即感客邪蒸熱咳嗽切忌羌防柴葛表散亦不可用桔杏蘇橘清肺止嗽有積者忌消導當靜以養陰亦屬調停之見以上論古大抵此症起於斫喪者肝腎過勞多亡血失精強中陰竭而死起於鬱結者內火爍津多致血結乾咳嗜食發癍而死起於藥誤者脾肺受疾居多多致飲食減少喘漱泄瀉而死此其大概也治之之法陰火刑金而咳脈數為內風生生則氣行急疾一呼一吸或六七至氣急巽風用事逼血妄行或吐衄或血去而陰益虛不獨肺燥膽汁亦枯膽枯木將自焚且肺既嗽又能激動火勢化液為痰逮肺枯而痿生水之源絕潮熱不休安得不死仲景曰脈數者風發也以飲食消息止之至精至妙實虛勞生死之關趁其人胃氣尚強以飲食補之所謂形不足者補之以味補氣血以肥鴨牛肉之屬補陰如海參鰻鱉補土如童雌黃雞鯽魚鱓魚清火則燕窩蛤蜊補肺豬肺百合健脾大棗蓮子多其火候恣意食之不可過飽恐脾難運化食後徐步服滋生丸一丸俾心閒氣靜內火不生久久食入於陰氣長於陽胃氣充足上升於肺肺能生水脈數乃退所忌發風動氣生冷之品此胃尚強時飲食調補一法也以上食養其或遷延日久服藥差誤大耗真氣中虛胃弱食少不運前法難施議者多本壯水制火知柏苦寒地黃濕滯即苓朮亦苦燥夫水從金出為天一之水方能有濟金之所以能生水者全賴脾胃之氣上升而水可生脾濕胃益弱而肺金愈無土生若用斂降無論難降即或火降而氣既下陷酷日無雲雨安從來過時復升其火愈甚皆不明水出高源水澤通氣之義也蓋脈數不除風行不息必無愈機診虛勞脈者盡一晝夜間必有一刻其數少減此正陰陽自為勝復之時乘此投藥迎機而導否則寅初氣注肺時服迴風湯入米耆露一杯數服後兼服丙辛湯及三合水湯脈少減者即是生機蓋此風與中風之風異彼則陰霾晝晦髮屋拔木狂暴之風此則夏日亢陽東南熏熟之風逆其勢自西而東則西方涼風至而雨可望矣故陽不上升者用柴胡左升以趨右今當升右之陽以趨左此又一法也以上回風若夫虛火上升面赤心煩咳嗽口乾其脈寸盛尺弱來盛去衰者病又加進先用導火湯引火下入小腸靜坐數刻火從下降降至丹田乘火在下時服赤幟湯填實中焦不使火得再上是韓信拔趙幟立漢幟法也此又一法也以上赤幟法若血初見時慎不可用酸斂止澀及生地之泥滯恐血凝而瘀須用黑金散降火去瘀最妙若勞力內傷嘔血者活蟹一大隻搗爛溫陳酒調服此皆陰火上升而生內風之虛勞也以上血症如痰中帶血如絲縷者是因咳傷肺也用清肺湯血從咯出者從肝腎來火猶未入於肺急服鎮火湯統治諸血發熱者有三陰陽虛勞常服者有升陰養血湯止嗽湯常服金生丸可引肺氣下入於腎以上總治此外有發熱晝夜不休肌膚澀絕無汗者必有外邪未清或誤為補藥所痼用內托湯熱服發汗以上夾邪又有骨蒸勞病肌膚不甚熱按之骨間甚熱其人善食而瘦皮膚枯澀無汗大便結實其脈沉緊數有力與諸虛勞不同皆起於風寒外邪日久蘊蓄而成當用苦寒大補陰之類大忌燥熱之品蓋其熱在骨髓亦不宜用升散之使其熱炎灼於外又諸虛皆系膽汁枯則肝木之火無水制而風火大發骨蒸一症膽汁尤枯用退蒸湯以上骨蒸又如每日先寒後熱如瘧汗出而熱始退者桂枝柴胡各半湯加膽汁二匙此外有因血瘀而發者婦人尤多古人䗪蟲丸之外有麥煎散今方黑金丸若夫傳屍瘵症其症心中煩熱欲露體覆之即悶驚悸怔忡面無顏色忘前失後乃心蒸之狀用傳屍勞方若骨蒸五心煩熱者清骨散問爛喉丹痧見於仲景書否此症宋元名家議論絕少能言其發病之故乎或曰由乎司天然燥令濕令俱能發病主氣客氣不一其說能詳說其所以然乎順症何如逆症何如初起之治法當何如中後之治法當何如當清之見證當何若當下之見症何若能詳言歟此症近來頗多家大人已立論在前尤當擴充其意而詳說之金匱云陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之此條經文與今之爛喉丹痧絕似而治法則不可從無論蜀椒雄黃溫燥不可服亦思此症發於春夏地氣本升不當再用升麻因於溫熱血中伏火不必更用當歸人所共知也古書絕少今時盛行者宋元名家多北人而此病盛於江南也從來論司天者其說不一吾以為客氣不足憑當實求之主氣與運行之令氣客氣如先天之八卦有定位而無用主氣令氣則參互錯綜隨時而見如今年春令地氣本溫而多西北風陰雨數旬此太陰濕土令氣加臨少陽相火主氣病必見濕遏鬱伏爛喉丹痧所由發也發之何如因疫癧之氣從口鼻而入於肺胃也何以爛喉濕熱鬱蒸也如何為痧與疹為類是血絡中病與癍之出於胃者不同當主芳香透絡辛涼解肌甘寒清血其後逆傳心胞仍不外乎葉老溫熱之旨然一症宜分三種風邪化熱者治宜清透濕邪化熱者治宜清滲痰火凝結者治宜清降順症初起脈緊弦數惡寒頭脹膚紅肌熱喉中碎腐而痛疹現隱隱三四日後溫邪化火熱盛痧透五六日後熱甚神昏喉爛此火盛逆傳內逼心胞見症也七日後熱退偏體焦紫痧如麩殼脫皮而愈此順症也若逆症一二日脈見細勁身雖紅痧不外透神識已昏語言錯亂氣逆喘急此由邪毒內閉肺胃內閉則外厥而脫矣治之之法順症一二日宜疏表牛蒡解肌湯或銀翹散加消食之品吹以珠黃散三四日化火前方加犀角羚角花粉石斛五六日見內逼心胞症在營分犀角地黃湯有汗神清者邪在氣分玉女煎加膽星石菖西黃藥珠甚則紫雪中後之治法大都如此其或便結燥實舌乾而黃黑者涼膈散即下法也協熱便泄舌苔白膩者葛根芩連至於逆症火毒內閉於肺胃用鮮地四兩搗汁加金汁梨汁蔗漿更葛根芩連至於逆症火毒內閉於肺胃用鮮地四兩搗汁加金汁梨汁蔗漿更用鮮蘆根煎湯磨犀角汁沖和紫雪丹或珠黃散要不外乎清開泄熱為主若夫不治之症鼻塞流涕者肺已傷不治閤眼朦朧者肝欲壞不治色白如粉皮者氣色敗尤屬不治蓋元氣虛者不能托毒外出毒且深伏雖有清補化邪一法究屬難圖尚不如陰虛者可重用養陰泄熱也治詳於溫熱症下焦篇中家大人老年議論甚惡夫清之太早者以感風感濕未曾化火而先清必有結毒發頤之變善乎祖鴻範之言曰初起發熱憎寒者以透散為主火鬱發之也惡寒已止內蘊之邪火方張以涼解為宜若仍執辛散火得風而益熾腫熱必增當於先後次第之間隨機權變各中其款要斯為盡善問婦人之病胎產為要妊子之脈能分辨歟男女之分可預測歟試胎之法果孰勝歟惡阻之因治之之法能詳言歟胎漏小產其因其治能詳說歟妊婦有頭痛心痛胃脘痛少腹痛股痛環跳痛目赤咽痛甚至於跌僕損傷能各舉其證因治法大略歟胎死腹中驗法下法亦附詳焉經曰手少陰脈動甚為妊子陰搏陽別為妊子身病無邪脈為妊子尺脈不絕為妊子夫尺者是少陰腎脈也腎脈滑利亦見帶症惟與手少陰心動脈相應乃為妊子無疑是即所謂陰搏陽別也且血留氣聚胞宮內實能無尺陰滑數乎其與虛勞數脈分別處胎脈數中有胃氣勞脈則兼弦澀無胃氣也然亦有中年羸婦細小而不數者其微弱中必有隱隱滑動之象可憑也辨男女之脈最難執左大為男右大為女之說不有臟氣偏勝者乎聞之先業師曰婦人背陰而面陽其左男子之右也右則男子之左也所以丹溪謂是診脈者左右手此不可憑者也惟兩寸浮滑為陽脈主男胎兩尺沉滑為陰脈主女胎庶幾近之然易不辨之男胎三月動而臍凸硬腹如釜女胎五月動臍軟腹如箕之為直捷也瘀阻與胎混不得已而用試法陳酒調佛手散歸七分芎一錢待兩時許臍腹微動為胎不動者為經滯法頗穩當惡阻者噁心阻其飲食也其故有二一由胃虛宿有痰飲而兼氣滯一由衝任上壅氣不下行蓋經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐及三月後胎漸大子能食血自無上逆之患然而間有不惡阻者何也中宮氣健胃無宿痰清濁自能升降不令穢氣上壅自無惡阻矣治法虛者加味參橘飲溫膽加參木歸藿砂實者小和中飲陳樸苓查扁草吐酸不止者二香藿草香附為末服二錢大約胃寒者加丁香豆蔻砂仁脾虛有火加黃芩山梔竹茹要不外丹溪兩言肥人多痰瘦人多火其法則二陳加減須知此病不必疑半夏茯苓二味為礙胎胎漏小產由於氣血虛弱者多氣虛則提攝不固血弱則灌溉不周而系胞者腎腰為腎腑腰痛則墮不可不防外此則血太熱而妄行大凡暴下水者胎必墮若徐下者可用補氣安神治之此症之脈宜弦牢滑利忌沉細而微其治視稟質所偏陰虛內熱者而用艾附白朮砂仁溫劑則陰愈消如草木之無雨露枯萎立見矣陽虛內寒者而用芩芍涼血則脾胃虛寒氣血亦弱如果實秋冬少結矣三月前宜養脾胃四月後宜壯腰腎此大法也以泰山磐石山散為主方八珍去苓加參斷芩耆血熱者加黃柏阿膠氣寒者加艾葉炮姜然而胎漏一症辨之宜慎有妊婦血盛月信常來而不墮者治之反墮亦有孕婦脈見滑數月事略少至三四月止者今人以為七月生其實足月也又有壯盛之婦前三月按月去血點滴者苟無腰痠胎動不須服藥此又當合形體論也再世人一月墮胎者最多其人好潔日必舉足洗下體而滑也胎前諸痛氣虛血虛血熱三種宜常目在之而外感內傷仍各宜分剖如頭痛血虛多火者四物加減感風者加味芎歸芩木茶心腹痛或素有痰飲更觸外感者正氣散按之痛者積滯保元不痛者脾胃傷六君滿痛及心芩朮芍三味不時腹痛者血虛熟地當歸二味煎湯服之重墜者氣虛也補中益氣脅痛者不宜破氣童便和酒服之少腹冷痛小建中加炮姜腰痛環跳痛者宜補目赤口舌咽痛者涼膈亦可服若跌僕傷者膠艾芎歸加地此其大略也至如面青舌紅母死子活面紅舌青母活子死為驗死胎之訣一定無疑下之之法丹溪用佛手散重劑歸一兩芎七錢要不若平胃加芒硝為穩問胎前症最多子懸症多心腹脹滿以紫蘇飲為主方其故何歟抑另有法歟又有子嗽喘咳子腫子氣子滿子煩五心煩熱煩躁口乾子淋子癇胎壓膀胱遺尿等症更有吐血衄血咳血便血諸症其因其治可詳言歟夫婦科諸書似少專門名家所作每見頭緒煩多雜亂無章如能條分縷晰俾學者知各門用方之所以然豈不善歟子懸者懷子六七月胸腹滿而胎上懸也中於氣鬱者多紫蘇飲一方出許學士本事方中自注云有婦產數日催生法不驗此必心懷畏懼氣結不行經謂恐則氣下精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行爰制此方服之即產分明紫蘇川芎陳皮腹皮疏氣舒郁歸芍補血參草補氣皆佐使也自注又云兼治六七月子懸數有效亦疏氣開鬱之意有熱加芩梔脹甚加木香汁歸術名和氣安胎飲停滯嘔吐加蒼樸名加參平胃散郁多者加味逍遙子嗽者妊婦外感風寒則咳咳久亦易墜胎古方用寧嗽散蘇桑杏皮知桔麥草亦有土虛不能生金者歸脾有陰火上炎者六味斟酌用之以余所用胎前咳四五月不止者橘餅一枚松子肉一兩水糖三錢煎服甚效喘由外感者參蘇飲然火動而喘孕婦最多治不外二母芩冬他若腰痛短氣脾虛則母令子虛腎氣不歸元而上乘於肺也生脈補肺益氣湯補脾須去升紫為妥子腫與子氣名異而相類子氣腫下體子腫腫上體子滿又名胎水在五六月後因胎大而腹滿遍身浮腫耳三症皆屬脾虛或因泄利耗傷病渴多飲濕漬脾胃水漬於胞胎易損傷急治為宜治法不外健脾利水四字健脾用六君利水用五皮出入兩方者利氣之烏藥香附紫蘇甚則加炮姜古人用五皮以白朮易去桑皮閻純璽以為點鐵成金手可類推矣外此治水氣有天仙藤即青木香藤散香附紫六分木香二分陳皮四分氣虛加參朮血虛加歸千金有鯉魚湯重一斤者橘一分姜七片同煮汁入朮苓歸芍同煎虛加人參此尤下水最捷法子煩者心驚膽怯煩悶不安由心肺虛熱或積痰於胸胎動不安竹葉安胎飲為主方君以竹葉條芩麥冬臣以棗仁遠志佐以四君去苓四物去芍渴加竹茹痰積者以竹葉換竹瀝茯苓躁甚熱壅口乾者加犀角知母氣虛倍人參又有因藥多致煩不得眠者用知母二兩棗肉丸彈子大每日參湯化一丸又有口乾不臥川連一味米飲調一錢子淋者小便淋漓澀少因氣血養胎不及敷榮滲道且胞系於腎腎中虛熱移於膀胱安榮湯主之君以燈心通草苓皮參朮補氣歸補血麥冬清肺去原方之滑石惡其重鎮而滑也以石斛山梔代之如在脈微弱氣陷者大劑參耆類此者有轉胞症因小便不通臍下急痛此由飽食忍尿或忍尿入房水氣上逆氣逼於胞屈戾不得舒張所致非小腸膀胱病當治其氣所謂胎壓膀胱也補中益氣為主方去濕者加油炒半夏六分血虛加芎地急用鹽湯吐提又不若穩婆以香油塗手從產戶托起其胎俾溺之漲解為穩使此症因虛子淋之因火者不同他如遺尿不知胎滿之故用白薇白芍酒調末服三錢虛者同地丹服子癇口噤項強肢攣語謇痰壅人事不省忽然卒倒與瘈瘲同不可作風治多因血虛血燥陰火上炎鼓動其痰主以羚羊角散鉤棗獨氣虛加參耆術血虛加歸芍芩有用南星一斤炭火炕酒製合琥珀一兩硃砂五錢豬心血為丸服五十丸參湯下此方通治癇症胎前亦宜妊家諸血症自當作火論然胎前宜清一語不可拘泥當分晰其火所由來第一辨虛實實火宜清其中又當分內外從外感者風熱內郁所化涼膈加歸地茅花從內發者肝經怒火加味逍遙膏粱積熱加味清胃川連翹丹地歸鬱結傷脾之火加味歸脾虛火宜補當分陰陽有氣不攝血者補中益氣有陰虛火旺者地歸二冬知母陳犀草芩梔朮苑有腎經虛火六味加芩地此口鼻血也二便之血多濕熱便血槐榆防歸烏梅尿血導赤加山梔發灰阿膠麥味問肺病咳嗽為多咳字嗽字何解能分講歟咳嗽症不外外感內傷兩種能分別歟外感不外風寒暑濕燥火六氣六氣分見於四時四時皆可以受六淫之邪能各舉其見證治法歟內傷不外陽虛陰虛陽虛者多痰陰虛者多見血能各言其見證治法歟勞風一症外感內傷並見能舉其治法歟先業師論治病莫妙於剖析分明愈細愈精曷不剖分而詳說之咳者何諧聲也其音開口而出彷彿亥字之音故有聲無痰曰咳嗽則如盥嗽然有物在喉漾漾而出故從口從敕後人遂以有痰者謂嗽然則咳嗽之病何從生曰病有萬變要不外內傷外感兩端試言外感外感者風寒暑濕燥火盡之而六者論其常各主一時為病論其變則四時皆可以受六淫之邪今且即風寒論感風咳者鼻塞聲重惡風涕清此證也左脈浮弦此脈也而風之中又有辨春則傷溫風肝木用事則傷肝而有又中氣中血之別傷氣者為衛參蘇飲桑菊飲傷血者為營芎蘇飲夏則為熱風傷心胞雞蘇散或傷冷風者香茹飲秋為涼風犯肺敗毒散兼痰者金沸草散冬為寒風傷腎麻黃湯加減兼飲者桂枝厚朴杏仁湯倘冬時天熱而感寒風葳蕤湯陽旦湯惟秋冬有暑濕如春夏無燥氣他如先傷風而後傷熱為熱之寒葳蕤肺熱感寒為寒之熱金沸草散嗽而痰出稠黏者脾濕勝二陳連嗽無痰者肺燥勝清燥救肺此皆外感咳嗽也內傷則痰飲陰虛兩種痰飲者多陽虛淺者六安煎有火者溫膽虛者金水六君煎陽虛而不可攻者玉竹飲子有痰火者鹽降法喘甚者降氣合貞元他若陰虛者陰火上升也胃氣不清者麥門冬湯五更咳甚曾見血者四陰煎痰多而濃無胃氣者六君加減痰少嗌乾胃氣未絕者六味八仙長壽凡若此者所謂隔二隔三之治土不生金者補脾木反侮金者平肝火上刑心者治心皆隔一之治也
