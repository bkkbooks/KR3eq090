front:
  text: 自序歲癸卯鼎汾年屆五十從事醫學者近二十年每臨症喜窮究其所以然之故求之不得質之古人以尋其極致之理俾愜於心而後安於是次兒鬥機年長欲與切磋斯道用策學條對例隨問隨答以得教學相長之益名之曰醫學課兒策將逐漸添補逐漸修改未敢以為定論而問世也先錄數篇質之同人倘得直諒多聞之友教所不逮則鼎汾雖不敏竊慕先賢蘧夫子之知非謹錄初稿之目如左時道光癸卯中秋朔日高鼎汾上池書溫熱一溫熱二溫熱三痢疾中風虛勞痙病暑病濕病燥病瘧疾喉痧婦人胎前肺病周序有清以來二百數十年醫術遞變由傷寒而開治溫之道以周葉陳陳薛諸氏為先錫邑當寧蘇之沖醫學一門名賢輩出嘉道間高錦亭先生造詣深邃著有瘍科心得集景岳新方歌邑志有傳孫文清公序而刊行王氏旭高乃其門下士也哲嗣上池學博承其家傳研究治術內外並精邑人稱之後學昔年與文孫研五遇出示其令祖所著醫學課兒策一卷並謂策中間附旁註為旭高先生診余過從共相商榷所注手錄一過想見當時教學相長揣摩極精非晚近淺嘗者可及方今歐風東漸國學有淪胥之勢浙中諸名彥懼中學之失傳也續行醫報訂行孤本越州裘君吉生識高學廣實綜其成函來徵書亟錄郵呈當蒙稱許付梓問世功非淺鮮惟當此保存國粹之日尤願同志諸君相與蒐羅徵集毋使名家著述或致湮沒也可中華民國四年冬月無錫伯華周鎮小農謹識
